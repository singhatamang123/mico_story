kind = "mobile"
previewPath = "/mobile/"
title = "Mico's Food Story Mobile"
version = "1.0.0"
id = "artifacts/micos-food-story-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 23142

[services.development]
run = "pnpm --filter @workspace/micos-food-story-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/micos-food-story-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/micos-food-story-mobile", "run", "serve" ]

[services.env]
PORT = "23142"
BASE_PATH = "/mobile/"
