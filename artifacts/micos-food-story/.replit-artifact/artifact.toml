kind = "web"
previewPath = "/"
title = "Mico's Food Story"
version = "1.0.0"
id = "artifacts/micos-food-story"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25338

[services.development]
run = "pnpm --filter @workspace/micos-food-story run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/micos-food-story", "run", "build" ]
publicDir = "artifacts/micos-food-story/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25338"
BASE_PATH = "/"
